name: Daily Bet Analysis

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Need full history so the rebase below has something to rebase onto.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd football_tipster
          pip install -r requirements.txt

      - name: Run analysis
        env:
          API_KEY: ${{ secrets.API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd football_tipster
          python main.py

      - name: Commit updated bets_log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add football_tipster/bets_log.csv
          if git diff --staged --quiet; then
            echo "No changes to bets_log.csv — skipping commit."
            exit 0
          fi
          git commit -m "chore: update bets_log [skip ci]"
          # Handle the race where the remote moved between checkout and push
          # (manual commits, prior workflow runs, etc.) — rebase then push.
          # `if`-form keeps `set -e` from killing the loop on a failed attempt.
          for i in 1 2 3 4 5; do
            if git pull --rebase origin master && git push origin master; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "All push attempts failed."
          exit 1
