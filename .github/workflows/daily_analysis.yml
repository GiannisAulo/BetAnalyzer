name: Daily Bet Analysis

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd football_tipster
          pip install -r requirements.txt

      - name: Run analysis
        env:
          API_KEY: ${{ secrets.API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd football_tipster
          python main.py

      - name: Commit updated bets_log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add football_tipster/bets_log.csv
          git diff --staged --quiet || git commit -m "chore: update bets_log [skip ci]"
          git push
