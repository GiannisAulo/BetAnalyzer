name: Daily Bet Analysis

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd football_tipster
          pip install -r requirements.txt

      - name: Run analysis
        env:
          API_KEY: ${{ secrets.API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd football_tipster
          python main.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: update bets_log [skip ci]'
          title: 'chore: update bets_log'
          body: 'Automated daily bet analysis update'
          branch: bets-log-update
          auto-merge-method: squash